<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CluColor — asset import</title>
<link rel="stylesheet" href="../tests/test.css">
</head>
<body>
<h1>asset import</h1>
<p class="sub" id="status">…</p>
<pre id="log"></pre>
<div id="out"></div>

<script type="module">
import { loadImage } from '../js/engine/assets.js';
import { keyOutCheckerboard, contentBounds, inpaintSparkle } from './keyout.js';

/**
 * Turns the generated renders into game-ready sprites:
 *   key out the fake checkerboard -> crop -> downsample NEAREST-NEIGHBOUR.
 *
 * Never smoothing: averaging blurs pixel art. Run once, offline; the results are
 * committed and the game never does this work.
 */
// NOTE: the ice-cream photo's raw source was deliberately deleted. Its sprite
// (assets/img/props/photo.png) ships as-is and cannot be re-derived.
const JOBS = [
  {
    name: 'lion',
    src: '../assets/_raw/lion.png',
    key: true,
    // ~2x a person. The boy is 38px of content, so the lion stands 78px.
    targetH: 78,
  },
  {
    name: 'house-exterior',
    src: '../assets/_raw/house-exterior.png',
    key: true,
    // ~3x a person, so it reads as a real building beside the 38px characters.
    targetH: 130,
  },
  {
    name: 'logo',
    src: '../assets/_raw/logo.png',
    // This one came back from a background remover, so its alpha is REAL — the
    // keyer detects that and only crops. But the remover also ANTI-ALIASED the
    // edges, which destroyed the pixel grid (run lengths of 2,3,4,5... instead of
    // clean multiples). So it is no longer pixel art, and must never be upscaled.
    // Kept at native size; CSS only ever scales it DOWN, which is smooth and fine.
    key: true,
    targetH: 130,
  },
  {
    name: 'house-room',
    src: '../assets/_raw/house-room.png',
    key: false,          // an opaque room, no transparency wanted
    exact: [480, 270],   // fills the canvas
  },
];

const lines = [];
const log = (s) => { lines.push(s); };
const out = document.getElementById('out');
const shots = [];

for (const job of JOBS) {
  log(`\n=== ${job.name} ===`);

  // A missing source must not kill the whole pipeline — the other assets still
  // need rebuilding, and one lost original should not block them.
  let img;
  try {
    img = await loadImage(job.src);
  } catch {
    log(`!! SOURCE MISSING: ${job.src}`);
    log('   skipping. The shipped sprite is unaffected, but it can no longer be re-derived.');
    continue;
  }
  log(`source: ${img.width}x${img.height}`);

  const src = document.createElement('canvas');
  src.width = img.width;
  src.height = img.height;
  const sc = src.getContext('2d', { willReadFrequently: true });
  sc.drawImage(img, 0, 0);

  // No prompt can suppress the generator's watermark, so it comes off here.
  if (job.sparkle) inpaintSparkle(src, job.sparkle, log);

  if (job.key) keyOutCheckerboard(src, log);

  const box = job.key
    ? contentBounds(src)
    : { left: 0, top: 0, w: src.width, h: src.height };
  log(`content: ${box.w}x${box.h} at (${box.left},${box.top})`);

  const [outW, outH] = job.exact
    ? job.exact
    : [Math.round(box.w * (job.targetH / box.h)), job.targetH];

  const small = document.createElement('canvas');
  small.width = outW;
  small.height = outH;
  const dc = small.getContext('2d');
  dc.imageSmoothingEnabled = false;
  dc.drawImage(src, box.left, box.top, box.w, box.h, 0, 0, outW, outH);
  log(`-> ${outW}x${outH}`);

  // Preview, zoomed, on a checkerboard so real transparency is obvious.
  const zoom = Math.max(1, Math.floor(900 / outW));
  const prev = document.createElement('canvas');
  prev.width = outW * zoom;
  prev.height = outH * zoom;
  const pc = prev.getContext('2d');
  for (let y = 0; y < prev.height; y += 12) {
    for (let x = 0; x < prev.width; x += 12) {
      pc.fillStyle = ((x + y) / 12) % 2 ? '#20242e' : '#171a22';
      pc.fillRect(x, y, 12, 12);
    }
  }
  pc.imageSmoothingEnabled = false;
  pc.drawImage(small, 0, 0, prev.width, prev.height);

  const p = document.createElement('p');
  p.className = 'sub';
  p.textContent = `${job.name} — ${outW}x${outH}`;
  out.append(p, prev);

  shots.push({ name: `import-${job.name}`, png: small.toDataURL('image/png') });
}

// --- favicon -----------------------------------------------------------------
//
// The red bench, alone on a grey field. It is not a decoration — it IS the game:
// the one object exempt from the grey, the thing the whole story walks toward. A
// tab icon of a red bench on grey says what the title screen says, in 16 pixels.
{
  const bench = await loadImage('../assets/img/props/bench.png'); // 45x30
  const N = 64;

  const fav = document.createElement('canvas');
  fav.width = N; fav.height = N;
  const fc = fav.getContext('2d');
  fc.imageSmoothingEnabled = false;

  fc.fillStyle = '#3f4654';   // the dead world
  fc.fillRect(0, 0, N, N);
  fc.fillStyle = '#4a5262';   // a hint of ground, so it is not floating
  fc.fillRect(0, 44, N, N - 44);

  // Centred, sitting ON the ground line. Integer position: no half-pixels.
  fc.drawImage(bench, Math.round((N - 45) / 2), 44 - 30);

  const p = document.createElement('p');
  p.className = 'sub';
  p.textContent = 'favicon — 64x64';
  out.append(p, fav);
  shots.push({ name: 'favicon', png: fav.toDataURL('image/png') });
  log('\n=== favicon ===\nbuilt from the bench sprite, 64x64');
}

await fetch('/__shot', {
  method: 'POST',
  headers: { 'content-type': 'application/json' },
  body: JSON.stringify({ shots }),
}).catch(() => {});

await fetch('/__report', {
  method: 'POST',
  headers: { 'content-type': 'application/json' },
  body: JSON.stringify({ suite: 'import' + lines.join('\n'), ua: navigator.userAgent, results: [{ name: 'imported', ok: true }] }),
}).catch(() => {});

document.getElementById('log').textContent = lines.join('\n');
document.getElementById('status').textContent = `imported ${JOBS.length}`;
document.getElementById('status').className = 'sub ok';
</script>
</body>
</html>
